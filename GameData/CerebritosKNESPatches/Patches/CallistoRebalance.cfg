@PART[_Knes_French_Hermes]
{
	@mass = 2
	@MODULE[ModuleProbeControlPoint]
	{
		@minimumCrew = 0
	}
	@MODULE[ModuleCommand]
	{
		@minimumCrew = 0
	}
	MODULE
	{
		name = ModuleCommand
		minimumCrew = 0
		RESOURCE
		{
			name = ElectricCharge
			rate = 0.04
		}
		hasHibernation = False
	}
	      @PROPELLANT[MonoPropellant]
		{
			@amount = 250
			@maxAmount = 250
		}
	}
}
@PART[_Knes_French_Hermes_Docking_Module]
{
	@mass = 0.3
}
@PART[_Knes_French_Hermes_Wings]
{
	@mass = 0.15
}
@PART[_Knes_French_Hermes_Rudder]
{
	@mass = 0.5
}
@PART[_French_Hermes_OME_Engine]
{
	@mass = 0.2
	@MODULE[ModuleEnginesFX]
    {
        @maxThrust = 30
	}
}
